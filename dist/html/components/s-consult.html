<section class="s-consult sect-m">
	<div class="container">
		<div class="s-consult__body">
			<div class="s-consult__info">
				<div class="sect-head">
					<div data-aos="fade-right" class="sect-head__subtitle">{ свяжитесь с нами }</div>
					<h2 data-aos="fade-right" data-aos-delay="300" class="s-title">Нужна консультация?</h2>
				</div>
				<div class="s-consult__content">
					Если у Вас есть вопросы или Вы хотите сделать заявку просто заполните
					контактную форму, и мы ответим вам в ближайшее время.
				</div>
			</div>
			<form action="#" class="s-consult__form">
				<div class="input-control">
					<input type="text" placeholder="Ваше имя" class="input" />
				</div>
				<div class="input-variants">
					<div class="input-variants__title">Выберите удобный тип связи</div>
					<span class="wpcf7-form-control-wrap" data-name="radio-719">
						<span class="wpcf7-form-control wpcf7-radio">
							<span class="wpcf7-list-item">
								<label>
									<input type="radio" name="radio-712" value="Telegram" />
									<span class="wpcf7-list-item-label">Telegram</span>
								</label>
							</span>
							<span class="wpcf7-list-item first">
								<label>
									<input type="radio" name="radio-712" value="Max" checked="checked" />
									<span class="wpcf7-list-item-label">Max</span>
								</label>
							</span>
							<span class="wpcf7-list-item last">
								<label>
									<input type="radio" name="radio-712" value="Звонок" />
									<span class="wpcf7-list-item-label">Звонок</span>
								</label>
							</span>
						</span>
					</span>
				</div>
				<div class="input-control">
					<input type="tel" placeholder="Укажите ваш номер телефона" class="input" />
				</div>
				<div class="check-wrapper _white">
					<span class="wpcf7-form-control-wrap" data-name="acceptance-377">
						<span class="wpcf7-form-control wpcf7-acceptance">
							<span class="wpcf7-list-item">
								<label>
									<input type="checkbox" name="acceptance-377" value="1" aria-invalid="false" />
									<span class="wpcf7-list-item-label">
										<span>
											Я соглашаюсь с
											<a href="#" target="_blank">
												Правилами обработки персональных данных
											</a>
										</span>
									</span>
								</label>
							</span>
						</span>
					</span>
				</div>
				<button type="submit" class="btn-s">Оставить заявку</button>
			</form>
		</div>
	</div>
</section>
